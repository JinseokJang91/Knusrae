# @ActiveProfiles("test") 전용 — CI/로컬 환경변수와 무관하게 컨텍스트 로딩
spring:
  config:
    import: optional:classpath:application-common.yml
  application:
    name: member-service
  datasource:
    url: jdbc:h2:mem:member_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 0
