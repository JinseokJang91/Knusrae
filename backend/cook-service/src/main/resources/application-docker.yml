# Docker Compose 환경 (RDS 사용 시 DB_URL, DB_USERNAME, DB_PASSWORD로 덮어씀)
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres-db:5432/knusrae_db}
    username: ${DB_USERNAME:knusrae_user}
    password: ${DB_PASSWORD:CookRecipes999!@#}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
